logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] %logger{36} [%X{correlationId:-}] - %msg%n"

spring:
  application:
    name: url-shortener-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:urlshortener}
    username: ${DB_USER:urlshortener}
    password: ${DB_PASSWORD:urlshortener}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

app:
  public-short-link-base: ${PUBLIC_SHORT_LINK_BASE:http://localhost:8080}
  redis-cache-ttl: ${REDIS_CACHE_TTL:24h}
  cors-allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    # Host Postgres from a container; override DB_HOST (Compose sets host.docker.internal by default).
    url: jdbc:postgresql://${DB_HOST:host.docker.internal}:${DB_PORT:5432}/${DB_NAME:urlshortener}
  data:
    redis:
      host: ${REDIS_HOST:redis}
